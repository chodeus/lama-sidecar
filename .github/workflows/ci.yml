name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'
      - run: pip install ruff
      - run: ruff check .
      - run: python -m py_compile app.py lama.py regions.py detect.py upscale.py test_smoke.py test_regions.py

      # Torch-free unit tests — fast feedback before the docker build job.
      - run: pip install numpy pillow
      - run: python test_regions.py

  build-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build image
        run: docker build -t lama-sidecar:ci .

      # Fail the build (before any release/GHCR push) on any *fixable*
      # HIGH/CRITICAL — a base-image re-pin or a dependency bump clears those.
      # ignore-unfixed skips OS CVEs with no upstream patch (Debian curl/perl
      # etc.), which we can't action and which don't touch the sidecar's runtime
      # path; document any fixable CVE we consciously accept in .trivyignore.
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: lama-sidecar:ci
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # Cache the model file (keyed on its MD5) so we don't re-download 200MB
      # every run. The host owns the file, so caching has no permission issues.
      - name: Restore model cache
        id: model-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: model-cache/big-lama.pt
          key: big-lama-e3aa4aaa15225a33ec84f9f4bc47e500

      - name: Download model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p model-cache
          curl -fSL https://github.com/Sanster/models/releases/download/add_big_lama/big-lama.pt \
            -o model-cache/big-lama.pt

      - name: Verify model checksum
        run: echo "e3aa4aaa15225a33ec84f9f4bc47e500  model-cache/big-lama.pt" | md5sum -c -

      # Writable mount: the smoke test exercises /detect and /upscale, whose
      # models download lazily into /models (as uid 99, hence the chmod). The
      # verified big-lama.pt is already in place, so that download is skipped.
      - name: Start container
        run: |
          chmod 777 model-cache
          docker run -d --name lama -p 8418:8418 \
            -v "$PWD/model-cache:/models" lama-sidecar:ci

      - name: Wait for health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8418/health | grep -q '"model_loaded":true'; then
              echo "healthy after ${i} tries"; exit 0
            fi
            sleep 5
          done
          echo "container never became healthy"; docker logs lama; exit 1

      - name: Smoke test (real inpaint)
        run: |
          pip install requests pillow numpy
          python test_smoke.py http://localhost:8418

      - name: Container logs on failure
        if: failure()
        run: docker logs lama || true
