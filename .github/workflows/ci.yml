name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check .
      - run: python -m py_compile app.py lama.py test_smoke.py

  build-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t lama-sidecar:ci .

      # Cache the model file (keyed on its MD5) so we don't re-download 200MB
      # every run. The host owns the file, so caching has no permission issues.
      - name: Restore model cache
        id: model-cache
        uses: actions/cache@v5
        with:
          path: model-cache/big-lama.pt
          key: big-lama-e3aa4aaa15225a33ec84f9f4bc47e500

      - name: Download model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p model-cache
          curl -fSL https://github.com/Sanster/models/releases/download/add_big_lama/big-lama.pt \
            -o model-cache/big-lama.pt

      - name: Verify model checksum
        run: echo "e3aa4aaa15225a33ec84f9f4bc47e500  model-cache/big-lama.pt" | md5sum -c -

      # Mount the verified model read-only; the container skips its own download.
      - name: Start container
        run: |
          docker run -d --name lama -p 8080:8080 \
            -v "$PWD/model-cache:/models:ro" lama-sidecar:ci

      - name: Wait for health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/health | grep -q '"model_loaded":true'; then
              echo "healthy after ${i} tries"; exit 0
            fi
            sleep 5
          done
          echo "container never became healthy"; docker logs lama; exit 1

      - name: Smoke test (real inpaint)
        run: |
          pip install requests pillow
          python test_smoke.py http://localhost:8080

      - name: Container logs on failure
        if: failure()
        run: docker logs lama || true

  publish:
    runs-on: ubuntu-latest
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/chodeus/lama-sidecar
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
